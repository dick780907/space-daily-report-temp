<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>史貝斯商務中心日報系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Noto Sans TC', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe',
              400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed',
              800: '#6b21a8', 900: '#581c87',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">
  <div id="app">
    <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center bg-gray-50">
      <div class="w-16 h-16 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin mb-4"></div>
      <p class="text-gray-500 text-sm">系統載入中...</p>
    </div>
  </div>

  <!-- ============ Core ============ -->
  <script src="js/utils.js?v=15"></script>
  <script src="js/data.js?v=15"></script>
  <script src="js/queries.js?v=15"></script>
  <script src="js/email.js?v=15"></script>
  <script src="js/components.js?v=15"></script>
  <script src="js/firebase-config.js?v=15"></script>
  <script src="js/firebase-data.js?v=15"></script>
  <script src="js/auth.js?v=15"></script>

  <!-- ============ Pages ============ -->
  <script src="js/pages/login.js?v=15"></script>
  <script src="js/pages/home.js?v=15"></script>
  <script src="js/pages/branch.js?v=15"></script>
  <script src="js/pages/admin.js?v=15"></script>

  <!-- ============ App Router ============ -->
  <script src="js/app.js?v=15"></script>

  <!-- ============ Firebase SDK ============ -->
  <script>
    (function() {
      if (typeof FIREBASE_CONFIG === 'undefined') return;
      if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
        console.log('Firebase 未配置，使用本地認證模式');
        return;
      }
      function loadScript(src) {
        return new Promise(function(resolve, reject) {
          var s = document.createElement('script');
          s.src = src; s.onload = resolve; s.onerror = reject;
          document.body.appendChild(s);
        });
      }
      var v = '10.12.2';
      loadScript('https://www.gstatic.com/firebasejs/' + v + '/firebase-app-compat.js')
        .then(function() {
          return Promise.all([
            loadScript('https://www.gstatic.com/firebasejs/' + v + '/firebase-firestore-compat.js'),
            loadScript('https://www.gstatic.com/firebasejs/' + v + '/firebase-auth-compat.js')
          ]);
        })
        .then(function() {
          console.log('Firebase SDK 載入完成');
          if (typeof initFirebase === 'function') initFirebase();
        })
        .catch(function(err) {
          console.warn('Firebase SDK 載入失敗，使用本地模式:', err);
        });
    })();
  </script>
</body>
</html>
